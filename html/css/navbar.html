<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavBar</title>
     <link rel="stylesheet" href="./fontawesome-free-6.7.2-web/fontawesome-free-6.7.2-web/css/all.min.css">
    <style>
        body{
           margin: 0;
           padding: 0;
           display: flex;
           justify-content: center;
           margin-top: 30px;
        
        
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmHFp4T4pX82Ot_k8Fhay6mrL7DEqMU59y6Aa7wdwkWw&s=10");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
           
        }
        nav{
            height: 70px;
            width: 88%;
            background:linear-gradient(to right, #ffffff,#fdf6d8,#f3d87b);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0px 25px;
            border-radius: 35px;
        }

        ul{
            width: 700px;
            display: flex;
            list-style: none;
            justify-content: space-around;
            align-items: center;
        }

        a{
            text-decoration: none;
            color: black;
            font-size: 20px;
        }
        a:hover{
            color: blue;
        }

        i{
            font-size: 24px;
            
        }

        h1{
            font-size: 32px;
            color:#3b2b16;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <nav>
        <h1>CoLabs</h1>
        <ul>
           <li><a href="">Services</a></li>
           <li><a href="">About</a></li>
           <li><a href="">Our Principles</a></li>
           <li><a href="">Community</a></li>
           <li><a href="">Contact</a></li>
           <li><a href=""><i class="fa-brands fa-instagram"></i></a></li>
            <li><a href=""><i class="fa-brands fa-facebook"></i></a></li>

        </ul>
    </nav>
</body>
</html>
