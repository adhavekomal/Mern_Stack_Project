<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Task</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: black;
        }
        .parent{
            width: 310px;
            height: 310px;
            background: white;
            border:5px solid white;

            display: grid;
            grid-template-columns: 60px 70px 80px 75px;
            grid-template-rows: 60px 80px 70px 75px;
            gap:5px;

        }
        .child{
            /* width: 120px; */
            /* height: 120px; */
            background: red;
        }
        .child1{
            grid-row: 1/3;
            grid-column: 1/2;
        }
      .child2{
            grid-row:3/5 ;
            grid-column:1/2 ;
      }
      .child3{
            grid-row: 1/2;
            grid-column: 2/4;
      }
      .child4{
             grid-row: 1/2;
             grid-column: 4/5;
      }
      .child5{
            grid-row: 2/3;
            grid-column: 2/3;
      }
      .child6{
             grid-row: 2/4;
            grid-column: 3/4;
      } 
      .child7{
             grid-row: 2/5;
            grid-column: 4/5;
      }
      .child8{
            grid-row: 3/5;
            grid-column: 2/3;
      }
      .child9{
             grid-row: 4/5;
            grid-column: 3/4;
      }
    </style>
</head>
<body>
    <div class="parent">
       <div class="child child1 "></div>
       <div class="child child2"></div>
       <div class="child child3"></div>
       <div class="child child4"></div>
       <div class="child child5"></div>
       <div class="child child6"></div>
       <div class="child child7"></div>
       <div class="child child8"></div>
       <div class="child child9"></div>
    </div>
</body>
</html>
