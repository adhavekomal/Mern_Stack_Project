<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <style>
        body{
            font-family: Arial,sans-serif;
            background-color: #F4F4F4;
            display: flex;
            justify-content: center;
            align-items: center;
             margin:50;
        }

        .container{
            display: flex;
            margin-top: 50px;
        }

        .box{
           width: 100px;
           height:100px;
           background-color: white;
           padding: 15px;
           /* margin: 10px; */
           border: 1px solid #000;
           box-shadow:2px 2px 5px ;
           margin-left: -10px;
           display: flex;
           transition: transform 0.3s ease, box shadow 0.3s ease;
           justify-content: center;
           text-align: center;
           transition-duration: 2s;
           transition-timing-function: 2s;
        }

        .box:first-child{
            margin-left: 0;
        }

        .box:hover{
            transform: translateY(-15px);
            box-shadow: 5px 5px 15px #888;
            background-color: yellow;
            height: 200px;
            width: 200ox;
            transition: 2s;
        }
        .circle{
            width: 30px;
            height: 30px;
            background-color: red;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        h3{
            margin: 10px 0 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="circle"></div>
            <h3>Section 1</h3>
        </div>
        
        <div class="box">
             <div class="circle"></div>
             <h3>Section 2</h3>
        </div>
       
        <div class="box">
             <div class="circle"></div>
            <h3>Section 3</h3>
        </div>
        
        <div class="box">
             <div class="circle"></div>
            <h3>Section 4</h3>
            </div>
        
        <div class="box">
             <div class="circle"></div>
            <h3>Section 5</h3>
        </div>
        <div class="box">
             <div class="circle"></div>
             <h3>Section 6</h3>
        </div>
    </div>
</body>
</html>
