<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Wheel</title>
    <style>
        body{
          display: flex;
           margin-top: 150px; 
           justify-content: center;
           align-items: center;
        }

        div{ 
           width: 500px;
            height: 500px;
            border-radius: 50%;
            border:1px solid;  
        }
        #circle{

            background-image:conic-gradient(
                red 0deg 45deg,
                green 45deg 90deg,
                blue 90deg 135deg,
                orange 135deg 180deg,
                yellow 180deg 225deg,
                black 225deg 270deg,
                pink 270deg 315deg,
                cyan 315deg 360deg
            );
        }
    
    </style>
</head>
<body>
    <div  id="circle"></div>
</body>
</html>
