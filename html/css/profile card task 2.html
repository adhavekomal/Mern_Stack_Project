<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        body{
            background-color: lightblue;
            text-align: center;
            margin:0;
            padding-top: 50px;

        }
        .card
        {
            width:700px;
            background-color: #d9edf7;
            margin: auto;
            padding:30px;
            border-radius: 20px;
            /* border: 2px solid white; */
        }

        .profile-img
        {
            width:150px;
            height:150px;
            border-radius: 50%;
            /* margin-bottom:15px; */
        }

        h1{
            margin-top: 50px;
            margin-bottom: 10px;
        }

        h3{
            color: gray;
            margin-bottom: 20px;
        }

        p{
            margin-bottom: 30px;
        }

        table{
            margin:auto;
            width:400px;
            text-align: center;
        }
        td{
            padding: 12px;
        }

        .follow
        {
            background-color: black;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            margin-right: 10px;
        }

        .view
        {
            background-color: white;
            color: black;
            padding:15px 40px;
            border: 1px solid black;
            border-radius: 8px;
        }


    </style>
</head>
<body>
    <div class="card">
        <img src="./profile.jpg" alt="profile image" class="profile-img" height="120" width="120">
        <h1>Komal Adhave</h1>
        <h3>@komaladhave</h3>
        <p>
            I am a Diploma Student. I enjoy creating websites and improving my technicalskills every day.
        </p>
        <table>
            <tr>
                <td><b>15K</b></td>
                <td><b>82</b></td>
                <td><b>1.3M</b></td>
            </tr>

            <tr>
                <td><b>Views</b></td>
                <td><b>Projects</b></td>
                <td><b>Followers</b></td>
            </tr>
        </table>
        <button>Follow</button>
        <button>View Profile</button>
        </div>
</body>
</html>
