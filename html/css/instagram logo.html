<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Logo</title>
    <style>
        body{
            justify-content: center;
            display: flex;
            align-items: center;
            margin-top: 150px;
        }

        #instagram{
             width: 300px;
             height: 300px;
             border-radius: 70px;

            background-image: linear-gradient(45deg,
            yellow,orange,deeppink,purple,skyblue
            );

            display:flex;
            justify-content: center;
            align-items: center;
        }

        #square{
            width: 180px;
            height: 180px;
            border:15px solid white;
            border-radius: 50px;

            display:flex;
            justify-content: center;
            align-items: center;
        }

        #circle{
           width: 80px;
            height: 80px;
            border:15px solid white;
            border-radius: 50%;   
        }

      
    </style>
</head>
<body>
    <div id="instagram">
    <div id="square">
    <div id="circle"></div>
   
     </div>
    </div>
</body>
</html>
