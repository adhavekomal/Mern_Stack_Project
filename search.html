     <link rel="stylesheet" href="./fontawesome-free-6.7.2-web/fontawesome-free-6.7.2-web/css/all.min.css">

     <style>
          body {
      font-family: Arial, sans-serif;
      background:linear-gradient(to right,lavender,lightpink);
    }

    h1{
      color:darkblue;
      text-shadow: 2px 2px 5px white;
    }

    #searchBar {
      margin-bottom: 20px;
      padding: 8px 12px;
      width: 280px;
      font-size: 16px;
     
    }

    .product-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .product {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 8px;
      width: 220px;
      background: white;
      text-align: center;
    }

    .product img {
       width: 200px;
       height: 180px;
       border-radius: 10px;
    }

    button{
      margin-top: 10px;
      padding: 8px 15px;
      cursor: pointer;
      background:linear-gradient(to right,purple,deeppink);
      color: white;
      border: none;
      border-radius: 4px;
    }

    .product button
    {
      background:blue;
      font-weight: bold;
      color: white;
    }
    </style>

</head>
<body>
    <h1><center>Amazon Lite</center></h1>

    <i class="fa-solid fa-magnifying-glass-minus"></i>
    <input type="text" name="" id="searchBar" placeholder="search here....">

     <button onclick="lowToHigh()">Low To High</button>
      <button onclick="highToLow()">High To Low</button>

     function display(list)
     {
        container.innerHTML="";
          // let div=document.createElement("div")

        list.forEach((product)=>{
            let div=document.createElement("div");
            // list.forEach((product)=>{
            div.classList.add("product");

            div.innerHTML=`<img src="${product.img}">
                           <h3>${product.pname}</h3>
                           <p>${product.cname}</p>
                           <p><strong>$${product.price}</strong></p>
                           <button onclick="">Buy Now</button>`;

             container.appendChild(div)              
        });
     }

      function lowToHigh()
{
    // alert("button working");
    let sorted=[...products];

    sorted.sort((a,b)=>a.price-b.price);

    display(sorted);
}

function highToLow()
{
    let sorted=[...products];

    sorted.sort((a,b)=>b.price-a.price);

    display(sorted);
}
        display(products);
     search.addEventListener("input",()=>{
        let searchval=search.value.toLowerCase();
        let filtered=products.filter((pr)=>{
            return pr.pname.toLowerCase().includes(searchval);
        });
        display(filtered)
        // display(products)
     });
