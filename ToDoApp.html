<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <style>
        body
        {
            background-color:skyblue;
            
        }

        .container
        {
            width: 800px;
            height: 500px;
            background-color: white;
            margin: 50px auto;
            padding-top: 80px;
            text-align: center;
            border-radius: 20px;
        }

        input
        {
            padding: 8px;
            width: 250px;
            border-radius: 5px;
        }

        button
        {
            padding: 8px 15px;
            margin:5px;
            border-radius: 5px;
            background-color: green;
            color: white;
            border: none;
        }

        #todolist
        {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
    <h1><center>To Do App</center></h1>
    <br><br><br>
    <input type="text" name="" id="todo" placeholder="Enter A Task">
    <br><br>
    <button onclick="addTodo()">Add ToDo</button>
    <br><br>
    <button onclick="deleteTodo()">Delete ToDo</button>
    <button onclick="updateTodo()">Update ToDo</button>
    <ul id="todolist"></ul>
    </div>

    <script>
        let arr=[];
        let task=document.getElementById("todo");
        let list=document.getElementById("todolist");

        function addTodo(){
            arr.push(task.value);
            task.value ="";
            console.log(arr);
            renderTodo();
        }

        function deleteTodo(){
            arr.pop();
            renderTodo();
        }

        function updateTodo(){
            let val=prompt("Enter Updated Task");
            if(val != "")
        {
            arr[0] = val;
            renderTodo();
        }
    }

        function renderTodo(){
            list.innerHTML="";
            arr.forEach((val)=>{
                list.innerHTML+="<li>"+ val +"</li>";
            })
        }
    </script>
</body>
</html>
